    <g transform="translate(1320 436)">
      <path d="M0-104v70" stroke="#473C33" stroke-width="4"/>
      <circle r="31" fill="#ABC270" stroke="#473C33" stroke-width="4"/>
      <circle cy="-104" r="23" fill="#FFFFFF" stroke="#473C33" stroke-width="4"/>
      <text y="7" font-size="18" font-weight="760">07</text>
      <text y="-98" font-size="14" font-weight="760">OBSERVE</text>
    </g>
  </g>

  <path d="M1320 500v238H222c-58 0-102-44-102-102v-92" fill="none" stroke="#473C33" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" marker-end="url(#arrow)"/>
  <g font-family="Mona Sans, Arial, sans-serif" fill="#473C33">
