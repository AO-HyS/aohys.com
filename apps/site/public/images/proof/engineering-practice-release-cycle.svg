<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title description">
  <title id="title">Reviewable release cycle</title>
  <desc id="description">A warm process map connects discovery, tests, implementation, review, browser quality assurance, release, and observation through one continuous feedback rail.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1l10 5-10 5z" fill="#473C33"/>
    </marker>
  </defs>

  <rect width="1440" height="900" fill="#FFFFFF"/>
  <path d="M36 36h1368v828H36z" fill="#FFFFFF" stroke="#473C33" stroke-width="4"/>
  <path d="M36 36h1368v20H36z" fill="#FEC868"/>

  <g font-family="Mona Sans, Arial, sans-serif" fill="#473C33">
    <text x="84" y="112" font-size="18" font-weight="760" letter-spacing="2">ENGINEERING PRACTICE · 01—07</text>
    <text x="84" y="180" font-size="58" font-weight="760" letter-spacing="-2">REVIEWABLE</text>
    <text x="84" y="238" font-size="58" font-weight="760" letter-spacing="-2">RELEASES</text>
    <text x="86" y="280" font-size="20" font-weight="620">One visible path from a clear brief to production evidence.</text>
  </g>

  <g transform="translate(1105 78)">
    <circle cx="112" cy="112" r="110" fill="#FEC868" stroke="#473C33" stroke-width="4"/>
    <path d="M52 58h120v108H52z" fill="#ABC270" stroke="#473C33" stroke-width="4"/>
    <path d="M52 110h120" fill="none" stroke="#473C33" stroke-width="4"/>
    <path d="M80 82h64M80 138h42" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="8"/>
    <circle cx="170" cy="166" r="34" fill="#FDA769" stroke="#473C33" stroke-width="4"/>
    <path d="M155 166l11 11 21-25" fill="none" stroke="#473C33" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"/>
  </g>

  <path d="M110 436h1218" fill="none" stroke="#473C33" stroke-linecap="round" stroke-width="28"/>
  <path d="M110 436h1218" fill="none" stroke="#FEC868" stroke-linecap="round" stroke-width="18"/>

