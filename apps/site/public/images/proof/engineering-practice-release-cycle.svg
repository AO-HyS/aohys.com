    <path d="M0 0h250v27H0z" fill="#FDA769" stroke="#473C33" stroke-width="4"/>
    <circle cx="21" cy="14" r="5" fill="#ABC270"/>
    <circle cx="39" cy="14" r="5" fill="#FEC868"/>
    <text x="18" y="64" font-size="15" font-weight="760">PREVIEW</text>
    <text x="18" y="87" font-size="22" font-weight="760">CHECKED ✓</text>
  </g>

  <g transform="translate(1218 687) rotate(-6)" font-family="Mona Sans, Arial, sans-serif" fill="#473C33" text-anchor="middle">
    <circle cx="74" cy="74" r="68" fill="#FDA769" stroke="#473C33" stroke-width="6"/>
    <circle cx="74" cy="74" r="54" fill="none" stroke="#473C33" stroke-width="3" stroke-dasharray="5 7"/>
    <text x="74" y="61" font-size="17" font-weight="760">READY</text>
    <text x="74" y="83" font-size="17" font-weight="760">TO</text>
    <text x="74" y="105" font-size="17" font-weight="760">SHIP</text>
