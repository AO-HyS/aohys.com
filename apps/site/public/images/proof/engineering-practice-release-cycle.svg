    <g transform="translate(720 436)">
      <path d="M0 34v70" stroke="#473C33" stroke-width="4"/>
      <circle r="31" fill="#FDA769" stroke="#473C33" stroke-width="4"/>
      <circle cy="104" r="23" fill="#FFFFFF" stroke="#473C33" stroke-width="4"/>
      <text y="7" font-size="18" font-weight="760">04</text>
      <text y="110" font-size="14" font-weight="760">REVIEW</text>
    </g>
    <g transform="translate(920 436)">
      <path d="M0-104v70" stroke="#473C33" stroke-width="4"/>
      <circle r="31" fill="#ABC270" stroke="#473C33" stroke-width="4"/>
      <circle cy="-104" r="23" fill="#FFFFFF" stroke="#473C33" stroke-width="4"/>
      <text y="7" font-size="18" font-weight="760">05</text>
