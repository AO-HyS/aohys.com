      <circle r="31" fill="#FDA769" stroke="#473C33" stroke-width="4"/>
      <circle cy="104" r="23" fill="#FFFFFF" stroke="#473C33" stroke-width="4"/>
      <text y="7" font-size="18" font-weight="760">06</text>
      <text y="110" font-size="14" font-weight="760">RELEASE</text>
