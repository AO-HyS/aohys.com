      <text y="7" font-size="18" font-weight="760">02</text>
      <text y="110" font-size="14" font-weight="760">TEST</text>
    </g>
    <g transform="translate(520 436)">
      <path d="M0-104v70" stroke="#473C33" stroke-width="4"/>
      <circle r="31" fill="#ABC270" stroke="#473C33" stroke-width="4"/>
      <circle cy="-104" r="23" fill="#FFFFFF" stroke="#473C33" stroke-width="4"/>
      <text y="7" font-size="18" font-weight="760">03</text>
